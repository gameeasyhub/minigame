<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кот Шрёдингера | mitAI Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; color: #fff;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; font-family: 'Press Start 2P', cursive;
        }
        #game-container {
            width: 100vw; height: 100vh;
            max-width: 56.25vh; /* 9:16 ratio */
            max-height: 177.77vw;
            background: radial-gradient(circle, #1a1a2e 0%, #000 100%);
            position: relative; border: 4px solid #333;
            box-sizing: border-box;
        }
        #flash-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; opacity: 0; pointer-events: none; z-index: 10;
        }
        svg { width: 100%; height: 100%; display: block; }
        .btn {
            position: absolute; bottom: 10%; left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px; font-family: 'Press Start 2P', cursive;
            font-size: 16px; color: #00ff00; background: rgba(0,0,0,0.8);
            border: 4px solid #00ff00; cursor: pointer;
            box-shadow: 0 0 20px rgba(0,255,0,0.2);
            transition: all 0.2s; z-index: 20;
            white-space: nowrap;
        }
        .btn:hover { background: #00ff00; color: #000; box-shadow: 0 0 40px #00ff00; }
        .btn:disabled { border-color: #444; color: #444; cursor: default; box-shadow: none; }
        
        #tg-link {
            display: none; position: absolute; bottom: 2%; left: 50%;
            transform: translateX(-50%); color: #0088cc; text-decoration: none;
            font-size: 10px; text-align: center; z-index: 20; width: 90%;
        }
        .status-tag { fill: #00ff00; font-size: 25px; text-anchor: middle; }
        .counter-text { fill: #ffd700; font-size: 20px; text-anchor: middle; }
        .glitch { filter: url(#glitch-filter); }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="flash-overlay"></div>
        <svg viewBox="0 0 1080 1920" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <filter id="glitch-filter">
                    <feFlood flood-color="red" result="flood1" />
                    <feFlood flood-color="blue" result="flood2" />
                    <feOffset in="SourceGraphic" dx="3" dy="0" result="off1" />
                    <feOffset in="SourceGraphic" dx="-3" dy="0" result="off2" />
                </filter>
            </defs>

            <!-- Title -->
            <text x="540" y="150" class="status-tag" fill="#ffd700" style="font-size: 40px;">mitAI LAB</text>
            <text x="540" y="250" class="status-tag" fill="#aaa">ЭКСПЕРИМЕНТ #02</text>
            
            <!-- Global Counter -->
            <g id="counter-group" transform="translate(540, 350)">
                <text class="counter-text">СПАСЕНО КОТОВ:</text>
                <text id="saved-count" y="70" class="status-tag" style="font-size: 60px;">0</text>
            </g>

            <!-- The Box -->
            <g id="box-group" transform="translate(240, 600)">
                <rect width="600" height="600" fill="#222" stroke="#444" stroke-width="10" />
                <path d="M0 0 L600 0 L500 -100 L100 -100 Z" fill="#333" stroke="#444" stroke-width="10" />
                <text x="300" y="350" font-size="200" text-anchor="middle" opacity="0.1" fill="#fff">⚛️</text>
                
                <!-- The Cat states -->
                <g id="cat-superposition">
                    <text id="cat-alive" x="300" y="400" font-size="250" text-anchor="middle">🐈</text>
                    <text id="cat-dead" x="300" y="400" font-size="250" text-anchor="middle" opacity="0">💀</text>
                </g>
                
                <!-- Front cover with X-RAY (opacity: 0.3) -->
                <rect id="box-cover" width="600" height="600" fill="#3d1e07" stroke="#2a1506" stroke-width="10" opacity="0.3" />
                <text id="box-label" x="300" y="320" class="status-tag" fill="#ffd700">СУПЕРПОЗИЦИЯ</text>
            </g>

            <!-- Result Message -->
            <text id="result-msg" x="540" y="1350" class="status-tag" opacity="0" style="font-size: 40px;"></text>
        </svg>

        <button id="main-btn" class="btn" onclick="collapse()">ОТКРЫТЬ КОРОБКУ</button>
        <a id="tg-link" href="https://t.me/mitAI_official" target="_blank">ГОРЯЧИЕ СПОРЫ В ТЕЛЕГРАМ <br> >>> t.me/mitAI_official <<<</a>
    </div>

    <script>
        const alive = document.getElementById('cat-alive');
        const dead = document.getElementById('cat-dead');
        const cover = document.getElementById('box-cover');
        const btn = document.getElementById('main-btn');
        const resMsg = document.getElementById('result-msg');
        const tgLink = document.getElementById('tg-link');
        const countDisplay = document.getElementById('saved-count');
        const flash = document.getElementById('flash-overlay');

        // Load persistent saved count safely
        let savedCount = 0;
        try {
            savedCount = parseInt(localStorage.getItem('mitAI_saved_cats')) || 0;
        } catch (e) {
            console.warn("LocalStorage blocked:", e);
        }
        countDisplay.textContent = savedCount;

        // 1. Superposition Animation (The Glitch)
        const superpositionTl = gsap.timeline({ repeat: -1 });
        superpositionTl.to(alive, { opacity: 0, duration: 0.05, delay: 0.5 })
                      .to(dead, { opacity: 0.3, duration: 0.05 })
                      .to(dead, { opacity: 0, duration: 0.05, delay: 0.2 })
                      .to(alive, { opacity: 0.5, duration: 0.05 });

        function collapse() {
            btn.disabled = true;
            superpositionTl.pause();
            
            // Flash effect using overlay
            gsap.to(flash, { opacity: 1, duration: 0.1, yoyo: true, repeat: 1 });

            // Random outcome
            const isAlive = Math.random() > 0.5;

            // Open cover
            gsap.to(cover, { opacity: 1, duration: 0.1 });
            gsap.to(cover, { x: 650, opacity: 0, duration: 0.8, ease: "power2.in", delay: 0.1, transformOrigin: "center" });
            gsap.to("#box-label", { opacity: 0, duration: 0.3 });

            setTimeout(() => {
                if (isAlive) {
                    gsap.set(alive, { opacity: 1, scale: 1.2, transformOrigin: "center" });
                    gsap.set(dead, { opacity: 0 });
                    resMsg.textContent = "КОТ ЖИВ! 🎉";
                    resMsg.setAttribute("fill", "#00ff00");
                    
                    savedCount++;
                    try {
                        localStorage.setItem('mitAI_saved_cats', savedCount);
                    } catch (e) {}
                    countDisplay.textContent = savedCount;
                    gsap.from(countDisplay, { scale: 1.8, duration: 0.5, ease: "back.out", transformOrigin: "center" });
                } else {
                    gsap.set(alive, { opacity: 0 });
                    gsap.set(dead, { opacity: 1, scale: 1.2, transformOrigin: "center" });
                    resMsg.textContent = "КОТ... МЕРТВ 💀";
                    resMsg.setAttribute("fill", "#ff4444");
                    // Add glitch effect to dead cat
                    dead.classList.add('glitch');
                }
                
                gsap.to(resMsg, { opacity: 1, y: -20, duration: 0.5 });
                tgLink.style.display = "block";
                btn.textContent = "ПОПРОБОВАТЬ СНОВА";
                btn.disabled = false;
                btn.onclick = () => location.reload();
            }, 500);
        }
    </script>
</body>
</html>
