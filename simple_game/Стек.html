<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Неоновый Стек – GameEasyHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080b10;
      --card-bg: rgba(22, 27, 34, 0.6);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-main: #f0f6fc;
      --text-muted: #8b949e;
      --accent-gradient: linear-gradient(135deg, #a855f7, #6366f1);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      -webkit-user-select: none;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg);
      background-image: 
        radial-gradient(circle at 50% 30%, rgba(99, 102, 241, 0.15), transparent 60%),
        linear-gradient(rgba(255, 255, 255, 0.01) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.01) 1px, transparent 1px);
      background-size: 100% 100%, 40px 40px, 40px 40px;
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Кнопка назад */
    .back-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      padding: 0.6rem 1.2rem;
      border-radius: 30px;
      color: var(--text-main);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: var(--transition);
      z-index: 10;
    }

    .back-btn:hover {
      border-color: rgba(168, 85, 247, 0.5);
      box-shadow: 0 0 15px rgba(168, 85, 247, 0.2);
      transform: translateX(-3px);
    }

    /* Игровой контейнер */
    .game-container {
      position: relative;
      width: 100%;
      max-width: 450px;
      height: 100vh;
      max-height: 750px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    canvas {
      background: transparent;
      display: block;
      max-width: 100%;
      max-height: 100%;
      border-radius: 16px;
    }

    /* Интерфейс поверх игры */
    .ui-layer {
      position: absolute;
      top: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      pointer-events: none;
      z-index: 5;
    }

    .score {
      font-size: 4rem;
      font-weight: 800;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
      margin-bottom: 0.2rem;
      filter: drop-shadow(0 2px 8px rgba(168, 85, 247, 0.3));
    }

    .high-score {
      font-size: 0.9rem;
      color: var(--text-muted);
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* Комбо-индикатор */
    .combo-indicator {
      position: absolute;
      top: 140px;
      font-size: 1.2rem;
      font-weight: 800;
      color: #38bdf8;
      opacity: 0;
      transform: scale(0.5);
      transition: transform 0.15s ease, opacity 0.15s ease;
      text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
      pointer-events: none;
      z-index: 5;
    }

    .combo-indicator.active {
      opacity: 1;
      transform: scale(1);
    }

    /* Экран старта / финиша */
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(8, 11, 16, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      z-index: 8;
      transition: opacity 0.4s ease;
      border-radius: 16px;
      border: 1px solid var(--card-border);
    }

    .overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .overlay h2 {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 1rem;
      color: var(--text-main);
    }

    .overlay p {
      color: var(--text-muted);
      margin-bottom: 2rem;
      max-width: 280px;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .btn {
      background: var(--accent-gradient);
      border: none;
      outline: none;
      color: #fff;
      padding: 1rem 2.5rem;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
      transition: var(--transition);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(99, 102, 241, 0.6);
    }

    .btn:active {
      transform: translateY(0);
    }

    /* Инструкция для мобильных */
    .tip {
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.3);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <!-- Кнопка возврата в хаб -->
  <a href="../index.html" class="back-btn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="19" y1="12" x2="5" y2="12"></line>
      <polyline points="12 19 5 12 12 5"></polyline>
    </svg>
    В меню хаба
  </a>

  <div class="game-container">
    <!-- UI элементы -->
    <div class="ui-layer">
      <div class="score" id="scoreDisplay">0</div>
      <div class="high-score" id="highScoreDisplay">Рекорд: 0</div>
    </div>

    <!-- Комбо-эффект -->
    <div class="combo-indicator" id="comboDisplay">ИДЕАЛЬНО x1</div>

    <!-- Игровой Canvas -->
    <canvas id="gameCanvas"></canvas>

    <!-- Экран Старта/Рестарта -->
    <div class="overlay" id="menuOverlay">
      <h2 id="menuTitle">Неоновый Стек</h2>
      <p id="menuDesc">Укладывайте двигающиеся неоновые плитки друг на друга. Будьте точны — каждый промах уменьшает размер следующей плитки!</p>
      <button class="btn" id="actionBtn">Играть</button>
      <div class="tip">Кликните по экрану или нажмите ПРОБЕЛ</div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const scoreDisplay = document.getElementById('scoreDisplay');
    const highScoreDisplay = document.getElementById('highScoreDisplay');
    const comboDisplay = document.getElementById('comboDisplay');
    const menuOverlay = document.getElementById('menuOverlay');
    const menuTitle = document.getElementById('menuTitle');
    const menuDesc = document.getElementById('menuDesc');
    const actionBtn = document.getElementById('actionBtn');

    // Настройка размеров Canvas
    const dpr = window.devicePixelRatio || 1;
    const gameWidth = 450;
    const gameHeight = 700;

    canvas.width = gameWidth * dpr;
    canvas.height = gameHeight * dpr;
    ctx.scale(dpr, dpr);

    // Аудио эффекты на Web Audio API
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new AudioCtx();
      }
    }

    function playBeep(pitch = 440, duration = 0.1, type = 'sine') {
      if (!audioCtx) return;
      try {
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        osc.type = type;
        osc.frequency.setValueAtTime(pitch, audioCtx.currentTime);
        
        gainNode.gain.setValueAtTime(0.08, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
      } catch (e) {}
    }

    // Состояние игры
    let score = 0;
    let highScore = localStorage.getItem('stack_high_score') || 0;
    let gameStarted = false;
    let gameOver = false;

    const blockHeight = 16;
    let cameraY = 0;
    let targetCameraY = 0;

    let tower = [];
    let debris = [];
    let particles = [];
    let currentBlock = null;

    let comboCount = 0;
    let hueOffset = Math.floor(Math.random() * 360);

    highScoreDisplay.textContent = `Рекорд: ${highScore}`;

    // Класс плитки (блока)
    class Block {
      constructor(x, y, z, w, d, hue, isMoving = false, axis = 'x') {
        this.x = x;
        this.y = y;
        this.z = z;
        this.w = w;
        this.d = d;
        this.h = blockHeight;
        this.hue = hue;
        this.isMoving = isMoving;
        this.axis = axis; // 'x' или 'y'
        this.direction = 1;
        this.speed = 2.5 + Math.min(score * 0.08, 4); // Скорость растет с ростом счета
      }

      update() {
        if (!this.isMoving) return;
        
        const limit = 220;
        if (this.axis === 'x') {
          this.x += this.direction * this.speed;
          if (this.x > limit || this.x < -limit) this.direction *= -1;
        } else {
          this.y += this.direction * this.speed;
          if (this.y > limit || this.y < -limit) this.direction *= -1;
        }
      }
    }

    // Класс обломков (падающих частей)
    class Debris {
      constructor(x, y, z, w, d, hue, vx, vy) {
        this.x = x;
        this.y = y;
        this.z = z;
        this.w = w;
        this.d = d;
        this.h = blockHeight;
        this.hue = hue;
        this.vx = vx;
        this.vy = vy;
        this.vz = 0;
        this.gravity = 0.5;
        this.rotation = 0;
        this.vRot = (Math.random() - 0.5) * 0.1;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.z += this.vz;
        this.vz -= this.gravity;
        this.rotation += this.vRot;
      }
    }

    // Класс эффектов частиц
    class Particle {
      constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.vx = (Math.random() - 0.5) * 6;
        this.vy = (Math.random() - 0.5) * 6;
        this.alpha = 1;
        this.decay = 0.03 + Math.random() * 0.02;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.alpha -= this.decay;
      }
    }

    // Изометрическая проекция 3D точек на 2D экран
    function project(x, y, z) {
      const cx = gameWidth / 2;
      // Знак "+" перед cameraY исправлен, чтобы камера плавно двигалась ВНИЗ по мере роста башни
      const cy = gameHeight * 0.72 + cameraY;
      const isoX = (x - y) * Math.cos(Math.PI / 6);
      const isoY = (x + y) * Math.sin(Math.PI / 6) - z;
      return { x: cx + isoX, y: cy + isoY };
    }

    // Функция отрисовки изометрического блока
    function drawBlock(block, alpha = 1) {
      const { x, y, z, w, d, h, hue } = block;

      const topColor = `hsla(${hue}, 80%, 55%, ${alpha})`;
      const leftColor = `hsla(${hue}, 80%, 42%, ${alpha})`;
      const rightColor = `hsla(${hue}, 80%, 30%, ${alpha})`;

      // Bottom points (z)
      const b_back = project(x, y, z);
      const b_right = project(x + w, y, z);
      const b_front = project(x + w, y + d, z);
      const b_left = project(x, y + d, z);

      // Top points (z + h)
      const t_back = project(x, y, z + h);
      const t_right = project(x + w, y, z + h);
      const t_front = project(x + w, y + d, z + h);
      const t_left = project(x, y + d, z + h);

      // Свечение для верхнего блока
      if (block.isMoving) {
        ctx.shadowColor = `hsl(${hue}, 80%, 65%)`;
        ctx.shadowBlur = 15;
      } else {
        ctx.shadowBlur = 0;
      }

      // 1. Отрисовка левой стороны (Фронт-Лево)
      ctx.fillStyle = leftColor;
      ctx.beginPath();
      ctx.moveTo(b_left.x, b_left.y);
      ctx.lineTo(b_front.x, b_front.y);
      ctx.lineTo(t_front.x, t_front.y);
      ctx.lineTo(t_left.x, t_left.y);
      ctx.closePath();
      ctx.fill();

      // 2. Отрисовка правой стороны (Фронт-Право)
      ctx.fillStyle = rightColor;
      ctx.beginPath();
      ctx.moveTo(b_front.x, b_front.y);
      ctx.lineTo(b_right.x, b_right.y);
      ctx.lineTo(t_right.x, t_right.y);
      ctx.lineTo(t_front.x, t_front.y);
      ctx.closePath();
      ctx.fill();

      // 3. Отрисовка верхней плоскости
      ctx.fillStyle = topColor;
      ctx.beginPath();
      ctx.moveTo(t_back.x, t_back.y);
      ctx.lineTo(t_right.x, t_right.y);
      ctx.lineTo(t_front.x, t_front.y);
      ctx.lineTo(t_left.x, t_left.y);
      ctx.closePath();
      ctx.fill();

      // Сброс свечения
      ctx.shadowBlur = 0;
    }

    // Отрисовка летящих обломков
    function drawDebris(deb) {
      ctx.save();
      drawBlock(deb, 0.7);
      ctx.restore();
    }

    // Инициализация новой игры
    function initGame() {
      initAudio();
      score = 0;
      scoreDisplay.textContent = score;
      cameraY = 0;
      targetCameraY = 0;
      tower = [];
      debris = [];
      particles = [];
      comboCount = 0;
      gameOver = false;

      // Базовая плитка-основание
      const baseSize = 160;
      tower.push(new Block(0, 0, 0, baseSize, baseSize, hueOffset));

      // Спавн первой летающей плитки
      spawnNextBlock();
    }

    // Создание следующей летающей плитки
    function spawnNextBlock() {
      const topBlock = tower[tower.length - 1];
      const nextZ = topBlock.z + blockHeight;
      const axis = tower.length % 2 === 0 ? 'x' : 'y';
      
      const nextHue = (hueOffset + tower.length * 6) % 360;

      // Плитка залетает с края
      let startX = topBlock.x;
      let startY = topBlock.y;
      if (axis === 'x') {
        startX = -180;
      } else {
        startY = -180;
      }

      currentBlock = new Block(startX, startY, nextZ, topBlock.w, topBlock.d, nextHue, true, axis);
      
      // ИСПРАВЛЕНО: Теперь вычитание идет в правильном направлении, камера уходит вниз.
      if (tower.length >= 8) {
        targetCameraY = (tower.length - 8) * blockHeight;
      } else {
        targetCameraY = 0;
      }
    }

    // Создание эффекта вспышки частиц при идеальной стыковке
    function spawnSuccessParticles(block) {
      const p = project(block.x + block.w / 2, block.y + block.d / 2, block.z + block.h);
      const color = `hsl(${block.hue}, 90%, 65%)`;
      for (let i = 0; i < 20; i++) {
        particles.push(new Particle(p.x, p.y, color));
      }
    }

    // Функция действия (укладка плитки)
    function handleAction() {
      if (!gameStarted || gameOver) return;

      const top = tower[tower.length - 1];
      const curr = currentBlock;
      curr.isMoving = false;

      let isPerfect = false;
      const tolerance = 4; // Пиксельная погрешность для идеального слияния

      if (curr.axis === 'x') {
        const offset = curr.x - top.x;
        if (Math.abs(offset) < tolerance) {
          // ИДЕАЛЬНО!
          curr.x = top.x;
          isPerfect = true;
        } else {
          // Вычисление среза
          const overlapStart = Math.max(curr.x, top.x);
          const overlapEnd = Math.min(curr.x + curr.w, top.x + top.w);
          const overlapWidth = overlapEnd - overlapStart;

          if (overlapWidth <= 0) {
            triggerGameOver();
            return;
          }

          // Создание падающего осколка
          if (curr.x < top.x) {
            debris.push(new Debris(curr.x, curr.y, curr.z, top.x - curr.x, curr.d, curr.hue, -2, 0));
          } else {
            debris.push(new Debris(overlapEnd, curr.y, curr.z, (curr.x + curr.w) - overlapEnd, curr.d, curr.hue, 2, 0));
          }

          curr.x = overlapStart;
          curr.w = overlapWidth;
        }
      } else {
        // Ось Y
        const offset = curr.y - top.y;
        if (Math.abs(offset) < tolerance) {
          // ИДЕАЛЬНО!
          curr.y = top.y;
          isPerfect = true;
        } else {
          // Вычисление среза
          const overlapStart = Math.max(curr.y, top.y);
          const overlapEnd = Math.min(curr.y + curr.d, top.y + top.d);
          const overlapDepth = overlapEnd - overlapStart;

          if (overlapDepth <= 0) {
            triggerGameOver();
            return;
          }

          // Создание падающего осколка
          if (curr.y < top.y) {
            debris.push(new Debris(curr.x, curr.y, curr.z, curr.w, top.y - curr.y, curr.hue, 0, -2));
          } else {
            debris.push(new Debris(curr.x, overlapEnd, curr.z, curr.w, (curr.y + curr.d) - overlapEnd, curr.hue, 0, 2));
          }

          curr.y = overlapStart;
          curr.d = overlapDepth;
        }
      }

      // Обработка комбо
      if (isPerfect) {
        comboCount++;
        showCombo(comboCount);
        spawnSuccessParticles(curr);
        playBeep(440 + comboCount * 45, 0.15, 'triangle');
      } else {
        comboCount = 0;
        hideCombo();
        playBeep(330, 0.1, 'sine');
      }

      tower.push(curr);
      score++;
      scoreDisplay.textContent = score;

      spawnNextBlock();
    }

    // Показать плашку комбо
    function showCombo(count) {
      comboDisplay.textContent = `ИДЕАЛЬНО x${count}`;
      comboDisplay.classList.add('active');
    }

    function hideCombo() {
      comboDisplay.classList.remove('active');
    }

    // Конец игры
    function triggerGameOver() {
      gameOver = true;
      playBeep(180, 0.4, 'sawtooth');

      // Падение всего текущего блока целиком
      debris.push(new Debris(currentBlock.x, currentBlock.y, currentBlock.z, currentBlock.w, currentBlock.d, currentBlock.hue, 0, 0));
      currentBlock = null;

      if (score > highScore) {
        highScore = score;
        localStorage.setItem('stack_high_score', highScore);
        highScoreDisplay.textContent = `Рекорд: ${highScore}`;
      }

      setTimeout(() => {
        menuTitle.textContent = "Игра окончена!";
        menuDesc.textContent = `Ваш результат: ${score} очк. Запустите новую попытку и побейте свой лучший результат!`;
        actionBtn.textContent = "Заново";
        menuOverlay.classList.remove('hidden');
      }, 1000);
    }

    // Главный игровой цикл
    function gameLoop() {
      ctx.clearRect(0, 0, gameWidth, gameHeight);

      // Плавный скроллинг камеры (увеличен коэффициент до 0.1 для большей отзывчивости)
      cameraY += (targetCameraY - cameraY) * 0.1;

      // Отрисовка башни
      tower.forEach(block => drawBlock(block));

      // Обновление и отрисовка движущегося блока
      if (currentBlock && !gameOver) {
        currentBlock.update();
        drawBlock(currentBlock);
      }

      // Обновление и отрисовка падающих обломков
      for (let i = debris.length - 1; i >= 0; i--) {
        const d = debris[i];
        d.update();
        drawDebris(d);

        // Удаление обломков улетевших за экран
        if (d.z < -200) {
          debris.splice(i, 1);
        }
      }

      // Отрисовка частиц
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.update();
        ctx.save();
        ctx.globalAlpha = p.alpha;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        if (p.alpha <= 0) {
          particles.splice(i, 1);
        }
      }

      requestAnimationFrame(gameLoop);
    }

    // Слушатели событий
    actionBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      initGame();
      menuOverlay.classList.add('hidden');
      gameStarted = true;
    });

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        if (!gameStarted) {
          actionBtn.click();
        } else {
          handleAction();
        }
      }
    });

    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      if (gameStarted) handleAction();
    });

    canvas.addEventListener('mousedown', (e) => {
      if (gameStarted) handleAction();
    });

    // Запуск цикла
    gameLoop();
  </script>
</body>
</html>
