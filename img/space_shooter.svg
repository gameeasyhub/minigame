<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2e"/>
      <stop offset="100%" style="stop-color:#1a0a3e"/>
    </linearGradient>
    <linearGradient id="ship" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4488ff"/>
      <stop offset="100%" style="stop-color:#2255cc"/>
    </linearGradient>
  </defs>
  <!-- Фон -->
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Звёзды -->
  <circle cx="100" cy="50" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="250" cy="80" r="1" fill="white" opacity="0.6"/>
  <circle cx="400" cy="30" r="2" fill="white" opacity="0.9"/>
  <circle cx="550" cy="100" r="1" fill="white" opacity="0.5"/>
  <circle cx="700" cy="60" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="150" cy="150" r="1" fill="white" opacity="0.4"/>
  <circle cx="650" cy="180" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="50" cy="300" r="1" fill="white" opacity="0.5"/>
  <circle cx="750" cy="350" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="300" cy="400" r="1" fill="white" opacity="0.4"/>
  <circle cx="500" cy="380" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="200" cy="250" r="1" fill="white" opacity="0.5"/>
  <circle cx="600" cy="280" r="1" fill="white" opacity="0.4"/>
  <!-- Корабль игрока (центр) -->
  <g transform="translate(400, 340)">
    <!-- Двигатель -->
    <polygon points="-10,15 0,35 10,15" fill="#ff6600" opacity="0.8"/>
    <polygon points="-5,15 0,28 5,15" fill="#ffaa00"/>
    <!-- Корпус -->
    <polygon points="0,-25 -20,15 -10,8 0,12 10,8 20,15" fill="url(#ship)" stroke="#88bbff" stroke-width="1.5"/>
    <!-- Кабина -->
    <circle cx="0" cy="-5" r="6" fill="#66ccff"/>
    <!-- Щит -->
    <circle cx="0" cy="0" r="22" fill="none" stroke="rgba(0,255,200,0.3)" stroke-width="2"/>
  </g>
  <!-- Враги -->
  <!-- Враг 1 (слева) -->
  <rect x="150" y="100" width="30" height="30" fill="#ff4444" rx="3"/>
  <!-- Враг 2 (справа) -->
  <polygon points="600,130 585,160 615,160" fill="#ff8800"/>
  <!-- Враг 3 -->
  <polygon points="300,80 290,105 310,105" fill="#ffaa00"/>
  <!-- Пули -->
  <rect x="398" y="300" width="4" height="12" fill="#00ffff" rx="2"/>
  <rect x="398" y="280" width="4" height="12" fill="#00ffff" rx="2"/>
  <rect x="398" y="260" width="4" height="12" fill="#00ffff" rx="2"/>
  <!-- Монета -->
  <circle cx="500" cy="200" r="10" fill="#ffd700" stroke="#ffaa00" stroke-width="1.5"/>
  <text x="500" y="204" text-anchor="middle" fill="#ffaa00" font-size="12" font-weight="bold">$</text>
  <!-- Текст -->
  <text x="400" y="420" text-anchor="middle" fill="#4fc3f7" font-size="24" font-weight="bold" font-family="Arial">SPACE SHOOTER</text>
</svg>
